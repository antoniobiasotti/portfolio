baseURL = "/"
languageCode = 'en-us'
title = 'Antônio Biasotti'
theme = 'typo'

relativeURLs = true
canonifyURLs = true


[taxonomies]
tag = 'tags'

# Google analytics code
googleAnalytics = "G-xxxxxxxxx"

[params]
hideBackToTop = false
#Custom CSS
customCSS = ["css/custom.css"]

# Meta description
description = "A Tech Blog"

# Appearance settings
theme = 'light'
colorPalette = 'eink'
hideHeader = false

# Intro on main page, content is markdown
homeIntroTitle = ''
homeIntroContent = """
##### Bacharelado em Sistemas de Informação | Analista de Dados
Estudante de Sistemas de Informação no <a target=_blank href="https://www.mackenzie.br/">Mackenzie</a>, 
apaixonado por Ciência de Dados e Inteligência Artificial. No momento escrevo minha tese, um framework estratégico para Governança de IA no Brasil 
que garanta segurança jurídica e liberdade econômica.<br><br>
Fique à vontade para se conectar ou ler <a href="/posts">meus posts</a>.
"""


# Collection to display on home
homeCollectionTitle = 'Posts'
homeCollection = 'posts'

# Lists parameters
paginationSize = 100
listSummaries = true
listDateFormat = '2 Jan 2006'

# Breadcrumbs
breadcrumbs = true

# Footer
showFooter = true
footerContent = "© Antonio Biasotti | Made using Hugo and tomfran/typo"

# Social icons
[[params.social]]
name = "linkedin"
url = "https://www.linkedin.com/in/antonio-biasotti/"

# [[params.social]]
# name = "medium"
# url = "https://medium.com/@user"

[[params.social]]
name = "github"
url = "https://github.com/antoniobiasotti"

# Main menu pages
[[params.menu]]
name = "Home"
url = "/"

[[params.menu]]
name = "CV"
url = "/about"

[[params.menu]]
name = "Trabalhos Acadêmicos"
url = "/coursework"

[[params.menu]]
name = "Posts"
url = "/posts"

# Syntax highlight on code blocks
[markup]
[markup.highlight]
style = 'algol'
[markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Giscus comments
[params.giscus]
enable = false
repo = "user/repo"
repoid = "repoId"
category = "General"
categoryid = "categoryId"
mapping = "pathname"
theme = "preferred_color_scheme"

